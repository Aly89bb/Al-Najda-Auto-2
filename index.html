<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0D1B3E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>نجدة أوتو — Najda Auto</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0D1B3E;
  --navy-light:#162244;
  --navy-dark:#080F22;
  --gold:#C9A84C;
  --gold-light:#E2C06A;
  --gold-dark:#A8892E;
  --orange:#F97316;
  --red:#EF4444;
  --green:#22C55E;
  --slate:#1e293b;
  --slate-light:#334155;
  --text:#f8fafc;
  --text-muted:#94a3b8;
  --radius:14px;
  --radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
html,body{height:100%;overflow:hidden}
body{background:var(--navy-dark);color:var(--text);font-family:'Cairo','Inter',sans-serif;display:flex;flex-direction:column}
#root{flex:1;display:flex;flex-direction:column;overflow:hidden}
input,textarea,select,button{font-family:inherit}
button{cursor:pointer;border:none;outline:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes ping{0%{transform:scale(1);opacity:1}100%{transform:scale(2.2);opacity:0}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes moveCar{0%{left:5%}100%{left:72%}}
@keyframes ring{0%,100%{transform:rotate(0)}15%,45%{transform:rotate(-10deg)}30%,60%{transform:rotate(10deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--gold)}50%{box-shadow:0 0 24px var(--gold-light),0 0 48px var(--gold)}}

.fade-in{animation:fadeIn 0.35s ease-out}
.slide-up{animation:slideUp 0.3s ease-out}
.pulse-anim{animation:pulse 1.5s ease-in-out infinite}
.bounce-anim{animation:bounce 1.2s ease-in-out infinite}
.spin-anim{animation:spin 0.8s linear infinite}
.ping-anim{animation:ping 1s cubic-bezier(0,0,0.2,1) infinite}
.ring-anim{animation:ring 0.5s ease-in-out}
.glow-anim{animation:glow 2s ease-in-out infinite}

/* TopBar */
.topbar{
  background:var(--navy);
  border-bottom:1px solid rgba(201,168,76,0.15);
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  z-index:50;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
}
.topbar-logo{display:flex;align-items:center;gap:10px}
.logo-img{width:38px;height:38px;border-radius:8px;object-fit:cover;border:1.5px solid var(--gold)}
.logo-text{font-size:13px;font-weight:700;color:var(--gold);line-height:1.2}
.logo-sub{font-size:10px;color:var(--text-muted);font-weight:400}
.topbar-center{font-size:15px;font-weight:800;color:var(--text);letter-spacing:0.3px}
.topbar-actions{display:flex;align-items:center;gap:10px}
.notif-btn{
  position:relative;width:38px;height:38px;
  background:var(--slate);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);font-size:18px;
  transition:all 0.2s;
}
.notif-btn:hover{background:var(--slate-light);color:var(--text)}
.notif-badge{
  position:absolute;top:-4px;right:-4px;
  background:var(--red);color:#fff;
  font-size:9px;font-weight:800;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--navy-dark);
}
.back-btn{
  width:36px;height:36px;background:rgba(255,255,255,0.08);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  color:var(--text);font-size:16px;transition:all 0.2s;
}
.back-btn:hover{background:rgba(255,255,255,0.14)}

/* Main content */
.main-content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px}

/* Bottom Nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--navy);
  border-top:1px solid rgba(201,168,76,0.15);
  display:flex;align-items:center;
  padding:8px 0 env(safe-area-inset-bottom,8px);
  z-index:50;
  box-shadow:0 -4px 20px rgba(0,0,0,0.4);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:6px 4px;cursor:pointer;
  color:var(--text-muted);font-size:10px;font-weight:600;
  transition:all 0.2s;border-radius:10px;
}
.nav-item .nav-icon{font-size:20px;transition:transform 0.2s}
.nav-item.active{color:var(--gold)}
.nav-item.active .nav-icon{transform:scale(1.15)}
.nav-sos{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:4px;cursor:pointer;
}
.sos-circle{
  width:52px;height:52px;
  background:linear-gradient(135deg,var(--red),#c0392b);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#fff;
  box-shadow:0 4px 16px rgba(239,68,68,0.5);
  border:3px solid rgba(255,255,255,0.15);
  transition:transform 0.15s;
  position:relative;top:-8px;
}
.sos-circle:active{transform:scale(0.94)}
.sos-label{font-size:9px;color:var(--text-muted);font-weight:600;margin-top:-4px}

/* Cards & UI */
.card{
  background:var(--slate);border-radius:var(--radius);
  padding:16px;border:1px solid rgba(255,255,255,0.06);
  box-shadow:var(--shadow);
}
.card-gold{border-color:rgba(201,168,76,0.25)}
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 20px;border-radius:var(--radius);font-size:15px;font-weight:700;
  transition:all 0.18s;width:100%;
}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--navy-dark)}
.btn-primary:hover{background:linear-gradient(135deg,var(--gold-light),var(--gold))}
.btn-danger{background:linear-gradient(135deg,var(--red),#c0392b);color:#fff}
.btn-danger:hover{background:linear-gradient(135deg,#f87171,var(--red))}
.btn-outline{background:transparent;border:1.5px solid var(--gold);color:var(--gold)}
.btn-outline:hover{background:rgba(201,168,76,0.1)}
.btn-ghost{background:rgba(255,255,255,0.07);color:var(--text)}
.btn-ghost:hover{background:rgba(255,255,255,0.12)}
.btn-green{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}

/* Form */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.3px}
.form-input{
  width:100%;background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.1);border-radius:var(--radius-sm);
  color:var(--text);font-size:14px;padding:11px 14px;
  transition:border-color 0.2s;
}
.form-input:focus{outline:none;border-color:var(--gold);background:rgba(201,168,76,0.06)}
.form-input::placeholder{color:var(--text-muted)}
.form-select{
  width:100%;background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.1);border-radius:var(--radius-sm);
  color:var(--text);font-size:14px;padding:11px 14px;
  appearance:none;cursor:pointer;
}
.form-select:focus{outline:none;border-color:var(--gold)}

/* Sections */
.section-title{
  font-size:18px;font-weight:800;color:var(--text);
  margin-bottom:4px;
}
.section-sub{font-size:12px;color:var(--text-muted);margin-bottom:16px}
.divider{height:1px;background:rgba(255,255,255,0.07);margin:16px 0}

/* Status badges */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;
}
.badge-pending{background:rgba(249,115,22,0.15);color:var(--orange)}
.badge-active{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-done{background:rgba(201,168,76,0.15);color:var(--gold)}
.badge-cancelled{background:rgba(239,68,68,0.15);color:var(--red)}

/* Modal / Sheet */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  z-index:100;display:flex;align-items:flex-end;
  backdrop-filter:blur(4px);
}
.modal-sheet{
  background:var(--navy-light);border-radius:24px 24px 0 0;
  padding:20px 16px;width:100%;max-height:90vh;overflow-y:auto;
  border-top:2px solid rgba(201,168,76,0.2);
}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px;text-align:center}
.modal-sub{font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:20px}

/* Toast */
.toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%);
  background:var(--slate-light);color:var(--text);
  padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;
  z-index:200;box-shadow:var(--shadow);white-space:nowrap;
  border:1px solid rgba(255,255,255,0.1);
}

/* SOS Screen */
.sos-page{padding:20px 16px;animation:fadeIn 0.35s ease-out}
.sos-hero{
  background:linear-gradient(135deg,var(--navy),var(--navy-light));
  border-radius:20px;padding:28px 20px;text-align:center;
  border:1.5px solid rgba(201,168,76,0.2);
  margin-bottom:20px;position:relative;overflow:hidden;
}
.sos-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(239,68,68,0.08) 0%,transparent 70%);
}
.sos-btn-main{
  width:120px;height:120px;border-radius:50%;
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 16px;cursor:pointer;
  box-shadow:0 8px 32px rgba(239,68,68,0.5),0 0 0 8px rgba(239,68,68,0.12);
  border:3px solid rgba(255,255,255,0.2);
  transition:transform 0.15s,box-shadow 0.15s;
  font-size:32px;
  position:relative;z-index:1;
}
.sos-btn-main:active{transform:scale(0.95);box-shadow:0 4px 16px rgba(239,68,68,0.5)}
.sos-btn-label{font-size:12px;font-weight:800;color:#fff;letter-spacing:1px;margin-top:4px}

/* Service tiers */
.tier-card{
  border-radius:var(--radius);padding:16px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all 0.2s;
  border:1.5px solid rgba(255,255,255,0.08);
  background:var(--slate);margin-bottom:12px;
}
.tier-card:active{transform:scale(0.98)}
.tier-card.selected{border-color:var(--gold);background:rgba(201,168,76,0.08)}
.tier-icon{font-size:28px;flex-shrink:0}
.tier-info{flex:1}
.tier-name{font-size:15px;font-weight:800;color:var(--text)}
.tier-desc{font-size:11px;color:var(--text-muted);margin-top:2px}
.tier-arrow{font-size:14px;color:var(--text-muted)}

/* Tracking */
.track-map{
  height:160px;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  border-radius:var(--radius);margin-bottom:14px;
  position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.track-road{
  position:absolute;bottom:40%;left:0;right:0;height:6px;
  background:rgba(255,255,255,0.2);border-radius:3px;
}
.track-car{
  position:absolute;font-size:22px;bottom:calc(40% + 2px);
  animation:moveCar 4s ease-in-out infinite alternate;
}
.track-dest{position:absolute;right:8%;bottom:calc(40% + 2px);font-size:20px}
.track-status{
  background:var(--slate);border-radius:var(--radius);padding:14px 16px;
  display:flex;align-items:center;gap:14px;margin-bottom:12px;
}
.track-eta{
  background:linear-gradient(135deg,var(--navy),var(--slate));
  border-radius:var(--radius);padding:14px;
  display:flex;align-items:center;justify-content:space-around;
  border:1px solid rgba(201,168,76,0.15);
}
.eta-item{text-align:center}
.eta-val{font-size:22px;font-weight:900;color:var(--gold)}
.eta-label{font-size:10px;color:var(--text-muted);font-weight:600}

/* Login */
.login-page{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px 20px;
  animation:fadeIn 0.35s ease-out;
}
.login-logo{margin-bottom:28px;text-align:center}
.login-title{font-size:24px;font-weight:900;color:var(--text);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text-muted);margin-bottom:28px}
.login-card{background:var(--slate);border-radius:20px;padding:24px 20px;width:100%;max-width:360px;border:1px solid rgba(201,168,76,0.15)}
.role-tabs{display:flex;gap:8px;margin-bottom:20px;background:rgba(255,255,255,0.05);border-radius:10px;padding:4px}
.role-tab{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;color:var(--text-muted);background:transparent;text-align:center;cursor:pointer;transition:all 0.2s}
.role-tab.active{background:var(--gold);color:var(--navy-dark)}

/* Notifications */
.notif-item{
  padding:14px 0;display:flex;align-items:flex-start;gap:12px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.notif-icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.notif-icon.sos{background:rgba(239,68,68,0.15);color:var(--red)}
.notif-icon.info{background:rgba(201,168,76,0.15);color:var(--gold)}
.notif-icon.ok{background:rgba(34,197,94,0.15);color:var(--green)}
.notif-text{flex:1}
.notif-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.notif-body{font-size:11px;color:var(--text-muted)}
.notif-time{font-size:10px;color:var(--text-muted);white-space:nowrap;margin-top:2px}

/* Dashboard (Manager) */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{
  background:var(--slate);border-radius:var(--radius);padding:16px;
  border:1px solid rgba(255,255,255,0.06);text-align:center;
}
.stat-val{font-size:28px;font-weight:900;color:var(--gold)}
.stat-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-top:4px}
.request-item{
  background:var(--slate);border-radius:var(--radius);padding:14px;
  margin-bottom:10px;border:1px solid rgba(255,255,255,0.06);
  animation:fadeIn 0.3s ease-out;
}
.request-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.request-id{font-size:12px;font-weight:700;color:var(--gold)}
.request-info{font-size:13px;color:var(--text);margin-bottom:4px}
.request-meta{font-size:11px;color:var(--text-muted)}
.assign-row{display:flex;gap:8px;margin-top:10px}

/* Profile / Settings */
.profile-hero{
  background:linear-gradient(135deg,var(--navy),var(--navy-light));
  padding:24px 16px;text-align:center;margin-bottom:16px;
}
.profile-avatar{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  display:flex;align-items:center;justify-content:center;
  font-size:28px;margin:0 auto 12px;
  border:3px solid rgba(255,255,255,0.15);
}
.profile-name{font-size:18px;font-weight:800;color:var(--text)}
.profile-role{font-size:12px;color:var(--gold);font-weight:600;margin-top:2px}
.setting-item{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:var(--slate);border-radius:var(--radius-sm);margin-bottom:8px;
  cursor:pointer;transition:background 0.2s;
}
.setting-item:hover{background:var(--slate-light)}
.setting-icon{font-size:20px;width:32px;text-align:center}
.setting-label{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.setting-arrow{font-size:12px;color:var(--text-muted)}

/* Loader */
.loader{width:32px;height:32px;border:3px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:40px;flex-direction:column;gap:12px}
.loading-text{font-size:13px;color:var(--text-muted)}

/* Mechanic */
.mechanic-card{
  background:var(--slate);border-radius:var(--radius);padding:14px;
  display:flex;align-items:center;gap:12px;margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.06);
}
.mechanic-avatar{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.mechanic-info{flex:1}
.mechanic-name{font-size:14px;font-weight:700;color:var(--text)}
.mechanic-status{font-size:11px;color:var(--text-muted);margin-top:2px}
.online-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;margin-left:4px}
.offline-dot{width:8px;height:8px;background:var(--text-muted);border-radius:50%;display:inline-block;margin-left:4px}

/* Empty state */
.empty-state{text-align:center;padding:48px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-text{font-size:12px;color:var(--text-muted)}

/* Splash */
.splash{
  position:fixed;inset:0;background:var(--navy-dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:300;
}
.splash-logo{
  width:90px;height:90px;border-radius:20px;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  display:flex;align-items:center;justify-content:center;
  font-size:42px;margin-bottom:20px;
  box-shadow:0 12px 40px rgba(201,168,76,0.35);
  animation:glow 2s ease-in-out infinite;
}
.splash-title{font-size:28px;font-weight:900;color:var(--text);margin-bottom:6px}
.splash-sub{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:32px}
.splash-loader{width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.splash-progress{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:2px;animation:splashLoad 2s ease-out forwards}
@keyframes splashLoad{from{width:0}to{width:100%}}
.splash-brand{margin-top:40px;font-size:11px;color:var(--text-muted);letter-spacing:1px}
.splash-brand span{color:var(--gold);font-weight:700}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>

<script>
const {useState, useEffect, useRef, useCallback, useMemo} = React;

// ─── Constants ───────────────────────────────────────────────
const SUPABASE_URL = window.SUPABASE_URL || '';
const SUPABASE_KEY = window.SUPABASE_KEY || '';

const TIERS = [
  { id: 'economy', icon: '🚗', name: 'الخدمة العادية', nameEn: 'Economy', desc: 'مساعدة أساسية على الطريق', color: '#64748b' },
  { id: 'premium', icon: '💎', name: 'الخدمة المميزة', nameEn: 'Premium', desc: 'خدمة شاملة وأولوية مرتفعة', color: '#C9A84C' },
  { id: 'vip', icon: '⚡', name: 'VIP طارئ', nameEn: 'VIP Urgent', desc: 'أقصى سرعة، أولوية قصوى', color: '#EF4444' },
];

const SERVICE_TYPES = [

// ─── Toast Hook ───────────────────────────────────────────────
function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, duration = 2500) => {
    setToast(msg);
    setTimeout(() => setToast(null), duration);
  }, []);
  return [toast, show];
}

// ─── Toast Component ──────────────────────────────────────────
function Toast({ msg }) {
  if (!msg) return null;
  return React.createElement('div', { className: 'toast fade-in' }, msg);
}

function SOSPage({ onSuccess, showToast }) {
  const [step, setStep] = useState(1);
  const [tier, setTier] = useState(null);
  const [serviceType, setServiceType] = useState('');
  const [location, setLocation] = useState('');
  const [name, setName] = useState('');
  const [phone, setPhone] = useState('');
  const [notes, setNotes] = useState('');
  const [loading, setLoading] = useState(false);
  const [locating, setLocating] = useState(false);

  const detectLocation = () => {
    setLocating(true);
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          setLocation(`${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`);
          setLocating(false);
          showToast('✅ تم تحديد موقعك');
        },
        () => {
          setLocating(false);
          showToast('⚠️ تعذر تحديد الموقع، أدخله يدوياً');
        },
        { timeout: 8000 }
      );
    } else {
      setLocating(false);
      showToast('⚠️ المتصفح لا يدعم تحديد الموقع');
    }

  const submit = () => {
    if (!name.trim() || !phone.trim() || !location.trim() || !serviceType || !tier) {
      showToast('⚠️ يرجى تعبئة جميع الحقول المطلوبة');
      return;
    }
    setLoading(true);
    // Simulate submission
    setTimeout(() => {
      setLoading(false);
      onSuccess({ id: 'NJ-' + Math.floor(Math.random() * 900 + 100), name, phone, tier, serviceType, location });

      React.createElement('div', { className: 'section-title' }, 'نوع العطل'),
      React.createElement('div', { className: 'section-sub' }, 'ما الذي يحتاج إلى مساعدة؟'),
      React.createElement('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 20 } },
        SERVICE_TYPES.map(s =>

            React.createElement('div', { style: { fontSize: 24 } }, s.icon),

          )
        )
      ),
      React.createElement('div', { style: { display: 'flex', gap: 8 } },
        React.createElement('button', { className: 'btn btn-ghost', style: { flex: 1 }, onClick: () => setStep(1) }, '← رجوع'),
        React.createElement('button', { className: 'btn btn-primary', style: { flex: 2 }, onClick: () => serviceType ? setStep(3) : showToast('⚠️ اختر نوع العطل') }, 'التالي ←')
      )

// ─── Root App ─────────────────────────────────────────────────
function App() {
  const [splashDone, setSplashDone] = useState(false);
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('home');
  const [showNotifs, setShowNotifs] = useState(false);
  const [notifs, setNotifs] = useState(MOCK_NOTIFS);
  const [requests, setRequests] = useState(MOCK_REQUESTS);
  const [mechanics] = useState(MOCK_MECHANICS);
  const [activeRequest, setActiveRequest] = useState(null);
  const [toast, showToast] = useToast();

  const unread = notifs.filter(n => !n.read).length;

  const handleLogin = (u) => { setUser(u); setPage('home'); };
  const handleLogout = () => { setUser(null); setPage('home'); };
  const handleNav = (p) => { setPage(p); setShowNotifs(false); };

  const handleSOSSuccess = (req) => {
    const newReq = { ...req, type: req.serviceType, status: 'active', location: req.location, time: 'الآن', mechanic: null };
    setRequests(prev => [newReq, ...prev]);
    setNotifs(prev => [{ id: Date.now(), type: 'sos', title: 'طلب نجدة جديد!', body: `${req.id} — ${req.name}`, time: 'الآن', read: false }, ...prev]);
    setActiveRequest(req);
    setPage('tracking');
    showToast('🆘 تم إرسال طلبك! الميكانيكي في الطريق...');
  };

  const handleReadNotif = (id) => {
    setNotifs(prev => prev.map(n => n.id === id ? { ...n, read: true } : n));
  };

  const renderPage = () => {
    if (showNotifs) {
      return React.createElement(NotificationsPage, { notifs, onRead: handleReadNotif });
    }

    // Client flow
    if (!user || user.role === 'client') {
      if (page === 'sos') return React.createElement(SOSPage, { onSuccess: handleSOSSuccess, showToast });
      if (page === 'tracking') return React.createElement(TrackingPage, { request: activeRequest, onClose: () => { setPage('home'); setActiveRequest(null); } });
      if (page === 'history') return React.createElement(HistoryPage);
      if (page === 'profile') return React.createElement(ProfilePage, { user: user || { role: 'client', name: 'زائر', phone: '' }, onLogout: () => { setUser(null); setPage('home'); } });
      return React.createElement(ClientHome, { onSOS: () => setPage('sos'), unreadCount: unread });
    }

    // Manager flow
    if (user.role === 'manager') {
      if (page === 'requests') return React.createElement(ManagerRequests, { requests, mechanics, showToast });
      if (page === 'mechanics') return React.createElement(ManagerMechanics, { mechanics });
      if (page === 'profile') return React.createElement(ProfilePage, { user, onLogout: handleLogout });
      return React.createElement(ManagerDashboard, { requests, mechanics });
    }

    // Mechanic flow
    if (user.role === 'mechanic') {
      if (page === 'tasks') return React.createElement(MechanicTasks, { showToast });
      if (page === 'profile') return React.createElement(ProfilePage, { user, onLogout: handleLogout });
      return React.createElement('div', { style: { padding: 16, animation: 'fadeIn 0.35s ease-out' } },
        React.createElement('div', { style: { textAlign: 'center', padding: '40px 0 20px' } },
          React.createElement('div', { style: { fontSize: 48, marginBottom: 12 } }, '👷'),
          React.createElement('div', { style: { fontSize: 18, fontWeight: 800 } }, `مرحباً ${user.name}`),
          React.createElement('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 4 } }, 'ميكانيكي — BRCC-AUTO')
        ),
        React.createElement('div', { style: { display: 'flex', gap: 12, marginBottom: 16 } },
          React.createElement('div', { className: 'stat-card', style: { flex: 1, background: 'rgba(34,197,94,0.1)', borderColor: 'rgba(34,197,94,0.3)' } },
            React.createElement('div', { className: 'stat-val', style: { color: 'var(--green)' } }, '2'),
            React.createElement('div', { className: 'stat-label' }, 'مهام اليوم')
          ),
          React.createElement('div', { className: 'stat-card', style: { flex: 1 } },
            React.createElement('div', { className: 'stat-val' }, '14'),
            React.createElement('div', { className: 'stat-label' }, 'هذا الشهر')
          )
        ),
        React.createElement('button', { className: 'btn btn-primary', onClick: () => setPage('tasks') }, '⚙️ عرض مهامي')
      );
    }
  };

  const getTitle = () => {
    if (showNotifs) return 'الإشعارات';
    if (!user || user.role === 'client') {
      const titles = { home: 'نجدة أوتو', sos: 'طلب المساعدة', tracking: 'تتبع الميكانيكي', history: 'سجل الطلبات', profile: 'حسابي' };
      return titles[page] || 'نجدة أوتو';
    }
    if (user.role === 'manager') {
      const t = { home: 'لوحة التحكم', dashboard: 'لوحة التحكم', requests: 'الطلبات', mechanics: 'الميكانيكيون', profile: 'الإعدادات' };
      return t[page] || 'BRCC-AUTO';
    }
    const t = { home: 'الرئيسية', tasks: 'مهامي', history: 'السجل', profile: 'حسابي' };
    return t[page] || 'نجدة أوتو';
  };

  if (!splashDone) return React.createElement(Splash, { onDone: () => setSplashDone(true) });
  if (!user && page !== 'home' && page !== 'sos' && page !== 'tracking') {
    // Show login for non-client routes if needed
  }

  // Show login if no user and accessing admin area
  if (!user) {
    return React.createElement(React.Fragment, null,
      React.createElement(Toast, { msg: toast }),
      React.createElement('div', { id: 'app', style: { display: 'flex', flexDirection: 'column', height: '100%' } },
        React.createElement(TopBar, {
          title: getTitle(),
          showLogo: page === 'home',
          onBack: page !== 'home' ? () => setPage('home') : null,
          onNotif: () => setShowNotifs(!showNotifs),
          notifCount: unread
        }),
        React.createElement('div', { className: 'main-content' }, renderPage()),
        React.createElement(BottomNav, { active: showNotifs ? '' : page, onNav: handleNav, role: 'client' }),
        React.createElement('div', { style: { position: 'fixed', bottom: 70, left: '50%', transform: 'translateX(-50%)', zIndex: 40, background: 'rgba(0,0,0,0.7)', borderRadius: 20, padding: '6px 14px', fontSize: 11, color: 'var(--text-muted)', border: '1px solid rgba(255,255,255,0.1)', whiteSpace: 'nowrap' } },
          '👔 مدير؟ ', React.createElement('span', { style: { color: 'var(--gold)', cursor: 'pointer', fontWeight: 700 }, onClick: () => { /* show login modal */ setUser({role:'manager',name:'محمد النعمان',phone:''}); setPage('home'); } }, 'دخول هنا')
        )
      )
    );
  }

  return React.createElement(React.Fragment, null,
    React.createElement(Toast, { msg: toast }),
    React.createElement('div', { id: 'app', style: { display: 'flex', flexDirection: 'column', height: '100%' } },
      React.createElement(TopBar, {
        title: getTitle(),
        showLogo: (page === 'home' || page === 'dashboard') && !showNotifs,
        onBack: (page !== 'home' && page !== 'dashboard') ? () => { setShowNotifs(false); setPage('home'); } : null,
        onNotif: () => setShowNotifs(!showNotifs),
        notifCount: unread
      }),
      React.createElement('div', { className: 'main-content' }, renderPage()),
      React.createElement(BottomNav, { active: showNotifs ? '' : page, onNav: handleNav, role: user.role })
    )
  );
}
