<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0D1B3E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>نجدة أوتو — Najda Auto</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0D1B3E;--navy-light:#162244;--navy-dark:#080F22;
  --gold:#C9A84C;--gold-light:#E2C06A;--gold-dark:#A8892E;
  --orange:#F97316;--red:#EF4444;--green:#22C55E;
  --slate:#1e293b;--slate-light:#334155;
  --text:#f8fafc;--text-muted:#94a3b8;
  --radius:14px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
html,body{height:100%;overflow:hidden}
body{background:var(--navy-dark);color:var(--text);font-family:'Cairo',sans-serif;display:flex;flex-direction:column}
#root{flex:1;display:flex;flex-direction:column;overflow:hidden}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes ping{0%{transform:scale(1);opacity:1}100%{transform:scale(2.2);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes moveCar{0%{left:5%}100%{left:72%}}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--gold)}50%{box-shadow:0 0 28px var(--gold-light)}}
@keyframes splashLoad{from{width:0}to{width:100%}}

.fade-in{animation:fadeIn 0.35s ease-out}
.ping-anim{animation:ping 1s cubic-bezier(0,0,0.2,1) infinite}
.spin-anim{animation:spin 0.7s linear infinite}
.glow-anim{animation:glow 2s ease-in-out infinite}

/* Layout */
.topbar{background:var(--navy);border-bottom:1px solid rgba(201,168,76,0.15);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.topbar-logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:18px;border:1.5px solid var(--gold)}
.logo-text{font-size:13px;font-weight:800;color:var(--gold);line-height:1.2}
.logo-sub{font-size:10px;color:var(--text-muted)}
.topbar-center{font-size:15px;font-weight:800;color:var(--text)}
.notif-btn{position:relative;width:38px;height:38px;background:var(--slate);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:18px;transition:all 0.2s}
.notif-btn:hover{background:var(--slate-light);color:var(--text)}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;font-weight:800;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--navy-dark)}
.back-btn{width:36px;height:36px;background:rgba(255,255,255,0.08);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:16px}

.main-content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:1px solid rgba(201,168,76,0.15);display:flex;align-items:center;padding:8px 0;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,0.4)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;color:var(--text-muted);font-size:10px;font-weight:600;transition:all 0.2s}
.nav-item .nav-icon{font-size:20px;transition:transform 0.2s}
.nav-item.active{color:var(--gold)}
.nav-item.active .nav-icon{transform:scale(1.15)}
.nav-sos{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;cursor:pointer}
.sos-circle{width:52px;height:52px;background:linear-gradient(135deg,var(--red),#c0392b);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;box-shadow:0 4px 16px rgba(239,68,68,0.5);border:3px solid rgba(255,255,255,0.15);position:relative;top:-8px;transition:transform 0.15s}
.sos-circle:active{transform:scale(0.94)}
.sos-label{font-size:9px;color:var(--text-muted);font-weight:600;margin-top:-4px}

/* Cards */
.card{background:var(--slate);border-radius:var(--radius);padding:16px;border:1px solid rgba(255,255,255,0.06);box-shadow:var(--shadow)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--radius);font-size:15px;font-weight:700;transition:all 0.18s;width:100%}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--navy-dark)}
.btn-danger{background:linear-gradient(135deg,var(--red),#c0392b);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--gold);color:var(--gold)}
.btn-ghost{background:rgba(255,255,255,0.07);color:var(--text)}
.btn-green{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:var(--radius-sm)}

.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.3px}
.form-input{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);border-radius:var(--radius-sm);color:var(--text);font-size:14px;padding:11px 14px;transition:border-color 0.2s}
.form-input:focus{outline:none;border-color:var(--gold);background:rgba(201,168,76,0.06)}
.form-input::placeholder{color:var(--text-muted)}
.form-select{width:100%;background:var(--slate);border:1.5px solid rgba(255,255,255,0.1);border-radius:var(--radius-sm);color:var(--text);font-size:13px;padding:9px 12px;cursor:pointer}
.form-select:focus{outline:none;border-color:var(--gold)}

.section-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px}
.section-sub{font-size:12px;color:var(--text-muted);margin-bottom:14px}

.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-pending{background:rgba(249,115,22,0.15);color:var(--orange)}
.badge-active{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-done{background:rgba(201,168,76,0.15);color:var(--gold)}
.badge-cancelled{background:rgba(239,68,68,0.15);color:var(--red)}

.loader{width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite}
.loader-gold{border-color:rgba(201,168,76,0.2);border-top-color:var(--gold)}

.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--slate-light);color:var(--text);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:200;box-shadow:var(--shadow);white-space:nowrap;border:1px solid rgba(255,255,255,0.1);animation:fadeIn 0.2s ease-out}

/* Splash */
.splash{position:fixed;inset:0;background:var(--navy-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300}
.splash-icon{width:90px;height:90px;border-radius:22px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:20px;animation:glow 2s ease-in-out infinite}
.splash-title{font-size:28px;font-weight:900;margin-bottom:4px}
.splash-sub{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:32px}
.splash-bar{width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.splash-progress{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));animation:splashLoad 2s ease-out forwards}
.splash-brand{margin-top:40px;font-size:11px;color:var(--text-muted);letter-spacing:1px}
.splash-brand span{color:var(--gold);font-weight:700}

/* Tiers */
.tier-card{border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.2s;border:1.5px solid rgba(255,255,255,0.08);background:var(--slate);margin-bottom:12px}
.tier-card:active{transform:scale(0.98)}
.tier-card.selected{border-color:var(--gold);background:rgba(201,168,76,0.08)}

/* Tracking */
.track-map{height:160px;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);border-radius:var(--radius);margin-bottom:14px;position:relative;overflow:hidden}
.track-road{position:absolute;bottom:40%;left:0;right:0;height:6px;background:rgba(255,255,255,0.2);border-radius:3px}
.track-car{position:absolute;font-size:22px;bottom:calc(40% + 2px);animation:moveCar 4s ease-in-out infinite alternate}
.track-dest{position:absolute;right:8%;bottom:calc(40% + 2px);font-size:20px}
.track-eta{background:linear-gradient(135deg,var(--navy),var(--slate));border-radius:var(--radius);padding:14px;display:flex;align-items:center;justify-content:space-around;border:1px solid rgba(201,168,76,0.15);margin-bottom:12px}
.eta-val{font-size:22px;font-weight:900;color:var(--gold);text-align:center}
.eta-label{font-size:10px;color:var(--text-muted);font-weight:600;text-align:center}

/* Stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--slate);border-radius:var(--radius);padding:16px;border:1px solid rgba(255,255,255,0.06);text-align:center}
.stat-val{font-size:28px;font-weight:900;color:var(--gold)}
.stat-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-top:4px}

/* Request items */
.request-item{background:var(--slate);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06);animation:fadeIn 0.3s ease-out}
.request-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.request-id{font-size:12px;font-weight:700;color:var(--gold)}

/* Profile */
.profile-hero{background:linear-gradient(135deg,var(--navy),var(--navy-light));padding:28px 16px;text-align:center;margin-bottom:16px}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;border:3px solid rgba(255,255,255,0.15)}
.setting-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--slate);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:background 0.2s}
.setting-item:hover{background:var(--slate-light)}

/* Notifs */
.notif-item{padding:14px 0;display:flex;align-items:flex-start;gap:12px;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer}
.notif-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.notif-icon.sos{background:rgba(239,68,68,0.15);color:var(--red)}
.notif-icon.info{background:rgba(201,168,76,0.15);color:var(--gold)}
.notif-icon.ok{background:rgba(34,197,94,0.15);color:var(--green)}

/* Login */
.login-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;animation:fadeIn 0.35s ease-out}
.role-tabs{display:flex;gap:8px;margin-bottom:20px;background:rgba(255,255,255,0.05);border-radius:10px;padding:4px}
.role-tab{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;color:var(--text-muted);background:transparent;text-align:center;cursor:pointer;transition:all 0.2s;border:none}
.role-tab.active{background:var(--gold);color:var(--navy-dark)}

/* Mechanic */
.mechanic-card{background:var(--slate);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06)}
.empty-state{text-align:center;padding:48px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
const {useState,useEffect,useRef,useCallback} = React;

// ── Supabase ──────────────────────────────────────────────────
const SUPA_URL = 'https://orbpucthawweysjedtpc.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yYnB1Y3RoYXd3ZXlzamVkdHBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjM4NDAsImV4cCI6MjA5ODMzOTg0MH0.uvHsg2a0L0Nyqp5NLus-p6HgQYBuy_yVZJ8dJ0L0RXQ';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── Constants ─────────────────────────────────────────────────
const TIERS = [
  {id:'economy', icon:'🚗', name:'الخدمة العادية', desc:'مساعدة أساسية على الطريق'},
  {id:'premium', icon:'💎', name:'الخدمة المميزة', desc:'خدمة شاملة وأولوية مرتفعة'},
  {id:'vip',     icon:'⚡', name:'VIP طارئ',       desc:'أقصى سرعة، أولوية قصوى'},
];
const SERVICE_TYPES = [
  {id:'flat_tire',label:'إطار مثقوب',   icon:'🛞'},
  {id:'battery',  label:'بطارية فارغة', icon:'🔋'},
  {id:'fuel',     label:'نفاد الوقود',  icon:'⛽'},
  {id:'engine',   label:'عطل المحرك',  icon:'⚙️'},
  {id:'towing',   label:'سحب السيارة', icon:'🚛'},
  {id:'lockout',  label:'مفتاح بالداخل',icon:'🔑'},
  {id:'accident', label:'حادث / طوارئ',icon:'🚨'},
  {id:'other',    label:'أخرى',         icon:'🔧'},
];
const sIcon  = t => SERVICE_TYPES.find(s=>s.id===t)?.icon  || '🔧';
const sLabel = t => SERVICE_TYPES.find(s=>s.id===t)?.label || 'خدمة';
const tIcon  = t => TIERS.find(x=>x.id===t)?.icon || '🚗';
const tName  = t => TIERS.find(x=>x.id===t)?.name || t;

// ── Toast ─────────────────────────────────────────────────────
function useToast(){
  const [msg,setMsg]=useState(null);
  const show=useCallback((m,d=2800)=>{setMsg(m);setTimeout(()=>setMsg(null),d);},[]);
  return [msg,show];
}
function Toast({msg}){
  if(!msg) return null;
  return React.createElement('div',{className:'toast'},msg);
}

// ── Splash ────────────────────────────────────────────────────
function Splash({onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2400);return()=>clearTimeout(t);},[]);
  return React.createElement('div',{className:'splash'},
    React.createElement('div',{className:'splash-icon'},'🚗'),
    React.createElement('div',{className:'splash-title'},'نجدة أوتو'),
    React.createElement('div',{className:'splash-sub'},'Najda Auto — خدمة المساعدة على الطريق'),
    React.createElement('div',{className:'splash-bar'},React.createElement('div',{className:'splash-progress'})),
    React.createElement('div',{className:'splash-brand'},'Powered by ',React.createElement('span',null,'A Planet T&L SUARL'))
  );
}

// ── TopBar ────────────────────────────────────────────────────
function TopBar({title,onBack,onNotif,notifCount=0,showLogo=false}){
  return React.createElement('div',{className:'topbar'},
    showLogo
      ? React.createElement('div',{className:'topbar-logo'},
          React.createElement('div',{className:'logo-icon'},'🚗'),
          React.createElement('div',null,
            React.createElement('div',{className:'logo-text'},'نجدة أوتو'),
            React.createElement('div',{className:'logo-sub'},'BRCC-AUTO')
          )
        )
      : React.createElement('button',{className:'back-btn',onClick:onBack},'←'),
    React.createElement('div',{className:'topbar-center'},title),
    React.createElement('button',{className:'notif-btn',onClick:onNotif},
      '🔔',
      notifCount>0 && React.createElement('div',{className:'notif-badge ping-anim'},notifCount>9?'9+':notifCount)
    )
  );
}

// ── Bottom Nav ────────────────────────────────────────────────
function BottomNav({active,onNav,role}){
  const clientItems=[
    {id:'home',icon:'🏠',label:'الرئيسية'},
    {id:'sos', icon:null,label:'نجدة'},
    {id:'history',icon:'📋',label:'طلباتي'},
    {id:'profile',icon:'👤',label:'حسابي'},
  ];
  const managerItems=[
    {id:'dashboard',icon:'📊',label:'لوحة التحكم'},
    {id:'requests', icon:'🚨',label:'الطلبات'},
    {id:'mechanics',icon:'👷',label:'الميكانيكيون'},
    {id:'profile',  icon:'⚙️',label:'الإعدادات'},
  ];
  const mechanicItems=[
    {id:'home', icon:'🏠',label:'الرئيسية'},
    {id:'tasks',icon:'⚙️',label:'مهامي'},
    {id:'history',icon:'📋',label:'السجل'},
    {id:'profile',icon:'👤',label:'حسابي'},
  ];
  const items = role==='manager'?managerItems:role==='mechanic'?mechanicItems:clientItems;
  return React.createElement('nav',{className:'bottom-nav'},
    items.map(item=>{
      if(item.id==='sos'){
        return React.createElement('div',{key:'sos',className:'nav-sos',onClick:()=>onNav('sos')},
          React.createElement('div',{className:'sos-circle'},'🆘'),
          React.createElement('div',{className:'sos-label'},'SOS')
        );
      }
      return React.createElement('div',{
        key:item.id,className:`nav-item ${active===item.id?'active':''}`,onClick:()=>onNav(item.id)
      },
        React.createElement('div',{className:'nav-icon'},item.icon),
        React.createElement('div',null,item.label)
      );
    })
  );
}

// ── Login ─────────────────────────────────────────────────────
function LoginPage({onLogin,showToast}){
  const [role,setRole]=useState('manager');
  const [phone,setPhone]=useState('');
  const [pass,setPass]=useState('');
  const [loading,setLoading]=useState(false);

  const doLogin=async()=>{
    if(!phone.trim()||!pass.trim()){showToast('⚠️ أدخل رقم الهاتف وكلمة المرور');return;}
    setLoading(true);
    const {data,error}=await sb.from('users').select('*').eq('phone',phone.trim()).eq('password',pass.trim()).eq('role',role).single();
    setLoading(false);
    if(error||!data){showToast('❌ بيانات غير صحيحة');return;}
    if(role==='mechanic'){
      await sb.from('users').update({is_online:true}).eq('id',data.id);
      data.is_online=true;
    }
    showToast(`✅ مرحباً ${data.name}`);
    onLogin(data);
  };

  return React.createElement('div',{className:'login-page'},
    React.createElement('div',{style:{textAlign:'center',marginBottom:28}},
      React.createElement('div',{style:{fontSize:54,marginBottom:8}},'🚗'),
      React.createElement('div',{style:{fontSize:24,fontWeight:900}},'نجدة أوتو'),
      React.createElement('div',{style:{fontSize:13,color:'var(--text-muted)',marginTop:4}},'بوابة الدخول الإداري')
    ),
    React.createElement('div',{style:{background:'var(--slate)',borderRadius:20,padding:'24px 20px',width:'100%',maxWidth:360,border:'1px solid rgba(201,168,76,0.15)'}},
      React.createElement('div',{className:'role-tabs'},
        React.createElement('button',{className:`role-tab ${role==='manager'?'active':''}`,onClick:()=>setRole('manager')},'👔 مدير'),
        React.createElement('button',{className:`role-tab ${role==='mechanic'?'active':''}`,onClick:()=>setRole('mechanic')},'👷 ميكانيكي')
      ),
      React.createElement('div',{className:'form-group'},
        React.createElement('label',{className:'form-label'},'📱 رقم الهاتف'),
        React.createElement('input',{className:'form-input',placeholder:'+222 XX XX XX XX',type:'tel',value:phone,onChange:e=>setPhone(e.target.value)})
      ),
      React.createElement('div',{className:'form-group'},
        React.createElement('label',{className:'form-label'},'🔒 كلمة المرور'),
        React.createElement('input',{className:'form-input',placeholder:'••••••••',type:'password',value:pass,onChange:e=>setPass(e.target.value),onKeyDown:e=>e.key==='Enter'&&doLogin()})
      ),
      React.createElement('button',{className:'btn btn-primary',onClick:doLogin,disabled:loading},
        loading?React.createElement(React.Fragment,null,React.createElement('div',{className:'loader'}),'جارٍ الدخول...'):'🔐 تسجيل الدخول'
      )

    setLocating(true);
    if(!navigator.geolocation){showToast('⚠️ المتصفح لا يدعم GPS');setLocating(false);return;}

      pos=>{
        setLat(pos.coords.latitude);setLng(pos.coords.longitude);

      : requests.map(r=>React.createElement('div',{key:r.id,className:'request-item'},
          React.createElement('div',{className:'request-header'},
            React.createElement('div',{className:'request-id'},`#${r.id} ${tIcon(r.tier)}`),
            React.createElement('span',{className:`badge badge-${r.status}`},r.status==='pending'?'⏳ معلق':r.status==='active'?'🔧 جارٍ':r.status==='done'?'✓ مكتمل':'✗ ملغي')
          ),
          React.createElement('div',{style:{fontSize:13,marginBottom:3}},`👤 ${r.client_name} — ${r.client_phone}`),
          React.createElement('div',{style:{fontSize:12,marginBottom:3}},`${sIcon(r.service_type)} ${sLabel(r.service_type)} • ${tIcon(r.tier)} ${tName(r.tier)}`),
          React.createElement('div',{style:{fontSize:11,color:'var(--text-muted)',marginBottom:6}},`📍 ${r.location}`),
          r.mechanic_name&&React.createElement('div',{style:{fontSize:11,color:'var(--gold)',marginBottom:6}},`👷 ${r.mechanic_name}`),
          r.status==='pending'&&React.createElement('div',{style:{display:'flex',gap:8}},
            React.createElement('select',{
              className:'form-select',style:{flex:1},
              defaultValue:'',
              onChange:e=>{
                const m=mechanics.find(x=>x.id===e.target.value);
                if(m) assignMechanic(r.id,m.id,m.name);
              }
            },
              React.createElement('option',{value:'',disabled:true},'تعيين ميكانيكي...'),
              mechanics.filter(m=>m.is_online).map(m=>React.createElement('option',{key:m.id,value:m.id},m.name))
            )
          ),
          r.status==='active'&&React.createElement('button',{className:'btn btn-green btn-sm',onClick:()=>closeRequest(r.id)},'✅ تم الإنجاز')
        ))
  );
}

// ── Manager Mechanics ─────────────────────────────────────────
function ManagerMechanics({mechanics}){
  return React.createElement('div',{style:{padding:16},className:'fade-in'},
    React.createElement('div',{className:'section-title',style:{marginBottom:4}},'فريق الميكانيكيين'),
    React.createElement('div',{className:'section-sub'},`${mechanics.filter(m=>m.is_online).length} متاح من أصل ${mechanics.length}`),
    mechanics.map(m=>React.createElement('div',{key:m.id,className:'mechanic-card'},
      React.createElement('div',{style:{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,var(--gold),var(--gold-dark))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}},'👷'),
      React.createElement('div',{style:{flex:1}},
        React.createElement('div',{style:{fontSize:14,fontWeight:700}},m.name),
        React.createElement('div',{style:{fontSize:11,color:'var(--text-muted)',marginTop:2}},m.specialty||m.role)
      ),
      React.createElement('span',{className:`badge ${m.is_online?'badge-active':'badge-cancelled'}`},m.is_online?'● متصل':'○ غير متصل')
    ))
  );
}

// ── Mechanic Tasks ────────────────────────────────────────────
function MechanicTasks({user,showToast,onRefresh}){
  const [tasks,setTasks]=useState([]);
  const [loading,setLoading]=useState(true);

  const load=useCallback(async()=>{
    setLoading(true);
    const {data}=await sb.from('requests').select('*').eq('mechanic_id',user.id).in('status',['active','pending']).order('created_at',{ascending:false});
    setTasks(data||[]);setLoading(false);
  },[user.id]);

  useEffect(()=>{load();},[load]);

  const complete=async(id)=>{
    await sb.from('requests').update({status:'done'}).eq('id',id);
    showToast('✅ تم إغلاق المهمة بنجاح');load();
  };

  if(loading) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',padding:40,flexDirection:'column',gap:12}},React.createElement('div',{className:'loader loader-gold'}),React.createElement('div',{style:{fontSize:13,color:'var(--text-muted)'}},'جارٍ التحميل...'));

  return React.createElement('div',{style:{padding:16},className:'fade-in'},
    React.createElement('div',{className:'section-title',style:{marginBottom:4}},'مهامي'),
    React.createElement('div',{className:'section-sub'},`${tasks.length} مهمة نشطة`),
    tasks.length===0
      ? React.createElement('div',{className:'empty-state'},React.createElement('div',{className:'empty-icon'},'🎉'),React.createElement('div',{style:{fontSize:15,fontWeight:700,marginBottom:6}},'لا توجد مهام حالياً'),React.createElement('div',{style:{fontSize:12,color:'var(--text-muted)'}},'ستظهر هنا المهام المعينة لك'))
      : tasks.map(t=>React.createElement('div',{key:t.id,className:'request-item'},
          React.createElement('div',{className:'request-header'},
            React.createElement('div',{className:'request-id'},`#${t.id} ${tIcon(t.tier)}`),
            React.createElement('span',{className:'badge badge-active'},'🔧 جارٍ')
          ),
          React.createElement('div',{style:{fontSize:13,marginBottom:3}},`👤 ${t.client_name} — ${t.client_phone}`),
          React.createElement('div',{style:{fontSize:12,marginBottom:3}},`${sIcon(t.service_type)} ${sLabel(t.service_type)}`),
          React.createElement('div',{style:{fontSize:11,color:'var(--text-muted)',marginBottom:10}},`📍 ${t.location}`),
          React.createElement('div',{style:{display:'flex',gap:8}},
            React.createElement('button',{className:'btn btn-ghost btn-sm',style:{flex:1}},'📍 الملاحة'),
            React.createElement('button',{className:'btn btn-green btn-sm',style:{flex:1},onClick:()=>complete(t.id)},'✓ إنهاء')
          )
        ))
  );
}

// ── Root App ──────────────────────────────────────────────────
function App(){
  const [splashDone,setSplashDone]=useState(false);
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('home');
  const [showNotifs,setShowNotifs]=useState(false);
  const [notifs,setNotifs]=useState([]);
  const [requests,setRequests]=useState([]);
  const [mechanics,setMechanics]=useState([]);
  const [activeRequest,setActiveRequest]=useState(null);
  const [toast,showToast]=useToast();

  const unread=notifs.filter(n=>!n.is_read).length;

  // Load data based on role
  const loadRequests=useCallback(async()=>{
    const {data}=await sb.from('requests').select('*').order('created_at',{ascending:false}).limit(50);
    setRequests(data||[]);
  },[]);

  const loadMechanics=useCallback(async()=>{
    const {data}=await sb.from('users').select('*').eq('role','mechanic');
    setMechanics(data||[]);
  },[]);

  const loadNotifs=useCallback(async()=>{
    const {data}=await sb.from('notifications').select('*').order('created_at',{ascending:false}).limit(30);
    setNotifs(data||[]);
  },[]);

  useEffect(()=>{
    if(!user) return;
    if(user.role==='manager'){
      loadRequests();loadMechanics();loadNotifs();
      // Realtime subscriptions
      const chReq=sb.channel('realtime-requests')
        .on('postgres_changes',{event:'*',schema:'public',table:'requests'},()=>{loadRequests();loadNotifs();})
        .subscribe();
      const chNotif=sb.channel('realtime-notifs')
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications'},payload=>{
          setNotifs(prev=>[payload.new,...prev]);
          showToast(`🆘 ${payload.new.title}`);
        }).subscribe();
      const chMech=sb.channel('realtime-mechs')
        .on('postgres_changes',{event:'*',schema:'public',table:'users'},()=>loadMechanics())
        .subscribe();
      return()=>{sb.removeChannel(chReq);sb.removeChannel(chNotif);sb.removeChannel(chMech);};
    }
    if(user.role==='mechanic'){
      const ch=sb.channel('realtime-mech-tasks')
        .on('postgres_changes',{event:'*',schema:'public',table:'requests',filter:`mechanic_id=eq.${user.id}`},()=>{})
        .subscribe();
      return()=>sb.removeChannel(ch);
    }
  },[user]);

  const handleLogin=u=>{setUser(u);setPage(u.role==='manager'?'dashboard':'home');};
  const handleLogout=async()=>{
    if(user?.role==='mechanic') await sb.from('users').update({is_online:false}).eq('id',user.id);
    setUser(null);setPage('home');setRequests([]);setNotifs([]);
  };
  const handleNav=p=>{setPage(p);setShowNotifs(false);};
  const handleSOSSuccess=req=>{setActiveRequest(req);setPage('tracking');showToast('🆘 تم إرسال طلبك! نحن في الطريق...');};
  const handleReadNotif=async id=>{
    await sb.from('notifications').update({is_read:true}).eq('id',id);
    setNotifs(prev=>prev.map(n=>n.id===id?{...n,is_read:true}:n));
  };

  const renderPage=()=>{
    if(showNotifs) return React.createElement(NotificationsPage,{notifs,onRead:handleReadNotif});
    if(!user||user.role==='client'){
      if(page==='sos') return React.createElement(SOSPage,{onSuccess:handleSOSSuccess,showToast});
      if(page==='tracking') return React.createElement(TrackingPage,{request:activeRequest,onClose:()=>{setPage('home');setActiveRequest(null);}});
      if(page==='history') return React.createElement(HistoryPage,{clientPhone:user?.phone||null});
      if(page==='profile') return React.createElement(ProfilePage,{user:user||{role:'client',name:'زائر',phone:''},onLogout:handleLogout});
      return React.createElement(ClientHome,{onSOS:()=>setPage('sos')});
    }
    if(user.role==='manager'){
      if(page==='requests') return React.createElement(ManagerRequests,{requests,mechanics,showToast,onRefresh:loadRequests});
      if(page==='mechanics') return React.createElement(ManagerMechanics,{mechanics});
      if(page==='profile') return React.createElement(ProfilePage,{user,onLogout:handleLogout});
      return React.createElement(ManagerDashboard,{requests,mechanics});
    }
    if(user.role==='mechanic'){
      if(page==='tasks') return React.createElement(MechanicTasks,{user,showToast,onRefresh:()=>{}});
      if(page==='history') return React.createElement(HistoryPage,{clientPhone:null});
      if(page==='profile') return React.createElement(ProfilePage,{user,onLogout:handleLogout});
      return React.createElement('div',{style:{padding:16},className:'fade-in'},
        React.createElement('div',{style:{textAlign:'center',padding:'40px 0 20px'}},
          React.createElement('div',{style:{fontSize:52,marginBottom:12}},'👷'),
          React.createElement('div',{style:{fontSize:18,fontWeight:800}},`مرحباً ${user.name}`),
          React.createElement('div',{style:{fontSize:12,color:'var(--text-muted)',marginTop:4}},'ميكانيكي — BRCC-AUTO'),
          React.createElement('span',{className:'badge badge-active',style:{marginTop:8}},'● متصل')
        ),
        React.createElement('button',{className:'btn btn-primary',style:{marginBottom:12},onClick:()=>setPage('tasks')},'⚙️ عرض مهامي'),
        React.createElement('button',{className:'btn btn-ghost',onClick:()=>setPage('history')},'📋 سجل المهام')
      );
    }
  };

  const getTitle=()=>{
    if(showNotifs) return 'الإشعارات';
    const role=user?.role||'client';
    const maps={
      client:{home:'نجدة أوتو',sos:'طلب المساعدة',tracking:'تتبع الميكانيكي',history:'سجل الطلبات',profile:'حسابي'},
      manager:{dashboard:'لوحة التحكم',requests:'الطلبات',mechanics:'الميكانيكيون',profile:'الإعدادات'},
      mechanic:{home:'الرئيسية',tasks:'مهامي',history:'السجل',profile:'حسابي'},
    };
    return maps[role]?.[page]||'نجدة أوتو';
  };

  const isHome=page==='home'||page==='dashboard';

  if(!splashDone) return React.createElement(Splash,{onDone:()=>setSplashDone(true)});
  if(!user) return React.createElement(React.Fragment,null,
    React.createElement(Toast,{msg:toast}),
    React.createElement(LoginPage,{onLogin:handleLogin,showToast})
  );

  return React.createElement(React.Fragment,null,
    React.createElement(Toast,{msg:toast}),
    React.createElement('div',{style:{display:'flex',flexDirection:'column',height:'100%'}},
      React.createElement(TopBar,{
        title:getTitle(),showLogo:isHome&&!showNotifs,
        onBack:(!isHome&&!showNotifs)?()=>{setShowNotifs(false);setPage(user.role==='manager'?'dashboard':'home');}:null,
        onNotif:()=>setShowNotifs(v=>!v),notifCount:unread
      }),
      React.createElement('div',{className:'main-content'},renderPage()),
      React.createElement(BottomNav,{active:showNotifs?'':page,onNav:handleNav,role:user.role})
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
